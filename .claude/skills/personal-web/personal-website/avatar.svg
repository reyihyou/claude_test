<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1e3a8a" />
            <stop offset="100%" stop-color="#3b82f6" />
        </linearGradient>
    </defs>

    <!-- 背景圆形 -->
    <circle cx="50" cy="50" r="48" fill="url(#gradient)" stroke="#ffffff" stroke-width="2"/>

    <!-- 简约字母 "L" 设计 -->
    <rect x="38" y="28" width="10" height="44" rx="5" fill="#ffffff"/>
    <rect x="38" y="64" width="24" height="10" rx="5" fill="#ffffff"/>

    <!-- 内部装饰圆 -->
    <circle cx="50" cy="50" r="38" fill="none" stroke="rgba(255, 255, 255, 0.2)" stroke-width="1"/>

    <!-- 简约点阵装饰 -->
    <circle cx="25" cy="30" r="1.5" fill="#ffffff" opacity="0.4"/>
    <circle cx="75" cy="30" r="1.5" fill="#ffffff" opacity="0.4"/>
    <circle cx="30" cy="75" r="1.5" fill="#ffffff" opacity="0.4"/>
    <circle cx="70" cy="75" r="1.5" fill="#ffffff" opacity="0.4"/>
</svg>